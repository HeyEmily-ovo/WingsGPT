<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WingsGPT - Your AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --user-msg: #52c41a; 
            --ai-msg: #f6ffed;   
            --ai-border: #b7eb8f; 
            --accent: #389e0d;    
            --text-main: #2d3436;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--primary-gradient); 
            margin: 0; 
            display: flex; 
            flex-direction: column; /* 改为纵向排列 */
            align-items: center;    /* 水平居中 */
            justify-content: flex-start; /* 从顶部开始排列 */
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto; /* 允许在内容过多时滚动 */
        }

        body::before {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            top: -100px;
            left: -100px;
            z-index: 0;
            animation: float 10s infinite alternate;
        }

        @keyframes float {
            from { transform: rotate(0deg) translate(0, 0); }
            to { transform: rotate(10deg) translate(20px, 20px); }
        }

        /* --- 左上角 Logo 放大 --- */
        .logo {
            position: absolute;
            top: 20px;
            left: 40px;
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            color: #2d5a27; 
            text-shadow: 2px 2px 8px rgba(255,255,255,0.6);
            z-index: 10;
            transition: all 0.3s ease; /* 增加平滑过渡 */
        }

        /* 移动端适配：当屏幕宽度小于 768px 时执行 */
        @media (max-width: 768px) {
            .logo {
                font-size: 3rem;   /* 缩小 Logo 字体 */
                top: 15px;         /* 调整位置 */
                left: 20px;
                width: 100%;       /* 让它水平居中或偏左 */
                text-align: center;/* 如果你希望在手机端居中，可以取消注释 */
            }
        }

        .chat-container { 
            position: relative;
            width: 90%; 
            max-width: 850px; 
            height: 90vh; /* 稍微降低高度，从 85vh 改为 80vh */
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); 
            border-radius: 30px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            z-index: 1;
            border: 1px solid rgba(255,255,255,0.4);
            
            /* 关键修改：增加顶部外边距，防止重叠 */
            margin-top: 100px; 
        }

        @media (max-width: 768px) {
            .chat-container {
                height: 85vh;     
                margin-top: 80px; /* 手机端顶部留白 */
                border-radius: 20px; /* 手机端圆角稍微减小更自然 */
            }
            
            .header {
                font-size: 1.1rem; /* 手机端标题也缩小一点，防止折行 */
                letter-spacing: 2px;
            }
        }

        /* --- 顶部 Header 放大 --- */
        .header { 
            padding: 22px; /* 增加内边距 */
            background: rgba(255,255,255,0.3); 
            border-bottom: 1px solid rgba(0,0,0,0.03); 
            text-align: center; 
            font-weight: 600; 
            color: var(--accent);
            letter-spacing: 4px; /* 增加字母间距更显大气 */
            font-size: 1.5rem; /* 从 0.9rem 放大到 1.5rem */
        }

        #chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
        }

        .message { 
            margin-bottom: 18px; 
            max-width: 80%; 
            line-height: 1.6; 
            padding: 14px 20px; 
            border-radius: 22px; 
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user { 
            background: var(--user-msg); 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 4px; 
            box-shadow: 0 4px 12px rgba(82, 196, 26, 0.2);
        }

        .ai { 
            background: var(--ai-msg); 
            color: var(--text-main); 
            align-self: flex-start; 
            border-bottom-left-radius: 4px;
            border: 1px solid var(--ai-border);
        }

        .input-area { 
            padding: 20px 30px; 
            background: white; 
            display: flex; 
            gap: 12px; 
            align-items: center;
        }

        input[type="text"] { 
            flex: 1; 
            padding: 14px 20px; 
            border: 1px solid #e8e8e8;
            background: #f9fbf9;
            border-radius: 15px; 
            outline: none; 
            transition: all 0.3s;
        }

        input[type="text"]:focus { 
            border-color: var(--user-msg);
            background: #fff;
            box-shadow: 0 0 8px rgba(82, 196, 26, 0.1);
        }

        button { 
            padding: 12px 25px; 
            background: var(--user-msg); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: 600;
            transition: all 0.3s;
        }

        button:hover { background: var(--accent); transform: translateY(-1px); }
        button:active { transform: translateY(0); }

        .typing { font-size: 0.8rem; color: var(--accent); padding: 0 30px 10px; display: none; }

        #chat-box::-webkit-scrollbar { width: 5px; }
        #chat-box::-webkit-scrollbar-thumb { background: #d9f7be; border-radius: 10px; }

        .copyright {
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 0.8rem;
            color: rgba(45, 90, 39, 0.5);
            font-weight: 400;
            z-index: 5;
            pointer-events: none;
            letter-spacing: 0.5px;
        }

        /* 适配手机端，防止挡住输入框 */
        @media (max-width: 600px) {
            .copyright {
                bottom: 5px;
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>

<div class="logo">Wings Production</div>

<div class="chat-container">
    <div class="header">WingsGPT Assistant</div>
    <div id="chat-box"></div>
    <div id="typing-indicator" class="typing">正在思考...</div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入消息..." onkeypress="if(event.keyCode==13) sendMsg()">
        <button id="send-btn" onclick="sendMsg()">发送</button>
    </div>
    
</div>
<div class="copyright">© 2026 Wings Intelligence. All rights reserved.</div>

<script>
    const API_KEY = 'sk-mwZa72d943f48450d07f3a31b819ed6de168c208706HSz7W'; 
    const BASE_URL = 'https://api.gptsapi.net/v1/chat/completions';
    
    marked.setOptions({ breaks: true, gfm: true });
    let messageHistory = [];

    window.onload = () => {
        const welcomeText = "你好！我是 **WingsGPT**。请问今天有什么可以帮你的吗？🍃";
        appendMessage('ai', welcomeText);
        messageHistory.push({ role: "assistant", content: welcomeText });
    };

    async function sendMsg() {
        const inputEl = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');
        
        const content = inputEl.value.trim();
        if (!content) return;

        inputEl.value = '';
        sendBtn.disabled = true;
        appendMessage('user', content);
        messageHistory.push({ role: "user", content: content });
        
        typingIndicator.style.display = 'block';
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch(BASE_URL, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'Authorization': `Bearer ${API_KEY}` 
                },
                body: JSON.stringify({
                    model: "gpt-4.1-mini",
                    messages: messageHistory
                })
            });

            const data = await response.json();
            const aiMsg = data.choices[0].message.content;

            appendMessage('ai', aiMsg);
            messageHistory.push({ role: "assistant", content: aiMsg });

        } catch (error) {
            appendMessage('ai', '❌ **抱歉**，连接似乎断开了。');
        } finally {
            typingIndicator.style.display = 'none';
            sendBtn.disabled = false;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    function appendMessage(role, text) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.innerHTML = role === 'ai' ? marked.parse(text) : text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
