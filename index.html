<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - Markdown版</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-bg: #f4f7f9; --chat-bg: #ffffff; --user-msg: #007bff;
            --ai-msg: #f0f2f5; --text-main: #333; --accent: #007bff;
        }

        body { font-family: -apple-system, system-ui, sans-serif; background: var(--primary-bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 800px; height: 90vh; background: var(--chat-bg); box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 20px; background: #fff; border-bottom: 1px solid #eee; text-align: center; font-weight: bold; color: var(--accent); }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }

        /* 2. 调整消息样式以适配 Markdown */
        .message { margin-bottom: 20px; max-width: 85%; line-height: 1.6; padding: 12px 18px; border-radius: 15px; word-wrap: break-word; }
        .message p { margin: 5px 0; } /* 修正 Markdown 段落间距 */
        .message ul, .message ol { padding-left: 20px; } /* 修正列表缩进 */
        .message code { background: rgba(0,0,0,0.05); padding: 2px 4px; border-radius: 4px; font-family: monospace; }
        .message pre { background: #2d2d2d; color: #ccc; padding: 10px; border-radius: 8px; overflow-x: auto; }

        .user { background: var(--user-msg); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: var(--ai-msg); color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 2px; }

        .input-area { padding: 20px; background: #fff; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 0 20px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; }
        .typing { font-size: 0.8rem; color: #999; padding: 0 20px 10px; display: none; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">AI Assistant (Rich Text)</div>
    <div id="chat-box"></div>
    <div id="typing-indicator" class="typing">正在思考...</div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入消息..." onkeypress="if(event.keyCode==13) sendMsg()">
        <button id="send-btn" onclick="sendMsg()">发送</button>
    </div>
</div>

<script>
    const API_KEY = 'sk-mwZa72d943f48450d07f3a31b819ed6de168c208706HSz7W'; 
    const BASE_URL = 'https://api.gptsapi.net/v1/chat/completions';
    
    // 3. 配置 marked 选项（使换行更自然）
    marked.setOptions({
        breaks: true, // 允许回车换行
        gfm: true     // 启用 GitHub 风格的 Markdown
    });

    let messageHistory = [];

    async function sendMsg() {
        const inputEl = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const typingIndicator = document.getElementById('typing-indicator');
        const content = inputEl.value.trim();
        if (!content) return;

        inputEl.value = '';
        appendMessage('user', content);
        messageHistory.push({ role: "user", content: content });

        typingIndicator.style.display = 'block';
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch(BASE_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                body: JSON.stringify({ model: "gpt-4.1-mini", messages: messageHistory })
            });

            const data = await response.json();
            const aiMsg = data.choices[0].message.content;

            appendMessage('ai', aiMsg);
            messageHistory.push({ role: "assistant", content: aiMsg });
        } catch (error) {
            appendMessage('ai', '**错误:** 无法连接服务器。');
        } finally {
            typingIndicator.style.display = 'none';
        }
    }

    function appendMessage(role, text) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        
        // 4. 关键改动：如果是 AI 回复，使用 marked 解析 Markdown
        if (role === 'ai') {
            msgDiv.innerHTML = marked.parse(text); 
        } else {
            msgDiv.innerText = text; // 用户输入通常维持原样
        }
        
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
