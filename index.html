<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary-bg: #f4f7f9; --chat-bg: #fff; --user-msg: #007bff; --ai-msg: #f0f2f5; --accent: #007bff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--primary-bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 800px; height: 90vh; background: var(--chat-bg); box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; }
        .header { padding: 15px; border-bottom: 1px solid #eee; text-align: center; font-weight: bold; color: var(--accent); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .message { margin-bottom: 20px; max-width: 85%; line-height: 1.6; padding: 12px 18px; border-radius: 15px; word-wrap: break-word; }
        .user { background: var(--user-msg); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: var(--ai-msg); color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .input-area { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        button { padding: 0 20px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; }
        button:disabled { background: #ccc; }
        pre { background: #2d2d2d; color: #fff; padding: 10px; border-radius: 8px; overflow-x: auto; }
        .typing { font-size: 0.8rem; color: #999; padding: 0 20px 10px; display: none; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">Secure AI Chat (Vercel)</div>
    <div id="chat-box"></div>
    <div id="typing-indicator" class="typing">正在思考...</div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="输入消息..." onkeypress="if(event.keyCode==13) sendMsg()">
        <button id="send-btn" onclick="sendMsg()">发送</button>
    </div>
</div>

<script>
    marked.setOptions({ breaks: true, gfm: true });
    let messageHistory = [];

    async function sendMsg() {
        const inputEl = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        const sendBtn = document.getElementById('send-btn');
        const typingIndicator = document.getElementById('typing-indicator');
        
        const content = inputEl.value.trim();
        if (!content) return;

        // 1. UI 反馈
        inputEl.value = '';
        sendBtn.disabled = true;
        appendMessage('user', content);
        messageHistory.push({ role: "user", content: content });
        typingIndicator.style.display = 'block';
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            // 2. 调用我们自己的 Vercel 后端接口（不带 Key）
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "gpt-4.1-mini",
                    messages: messageHistory
                })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error);

            const aiMsg = data.choices[0].message.content;

            // 3. 渲染 AI 回复
            appendMessage('ai', aiMsg);
            messageHistory.push({ role: "assistant", content: aiMsg });
        } catch (error) {
            appendMessage('ai', '❌ **错误:** ' + error.message);
        } finally {
            typingIndicator.style.display = 'none';
            sendBtn.disabled = false;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    }

    function appendMessage(role, text) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.innerHTML = role === 'ai' ? marked.parse(text) : text;
        chatBox.appendChild(msgDiv);
    }
</script>
</body>
</html>
